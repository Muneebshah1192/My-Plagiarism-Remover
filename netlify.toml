[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit --no-fund"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/rewrite"
  to = "/.netlify/functions/rewrite"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
